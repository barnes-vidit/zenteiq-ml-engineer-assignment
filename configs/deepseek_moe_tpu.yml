# DeepSeek MoE Model Configuration for TPU (Run 5 — Best Result)
# Model parameters: 0.719 Billion
# Hardware: 1x Cloud TPU v5e (v5e-1)

# --- General training ---
model_name: "deepseek2-16b"
steps: 50
dataset_type: "synthetic"
hardware: "tpu"
enable_checkpointing: false

# --- Sequence & batch ---
per_device_batch_size: 8
max_target_length: 512

# --- Dtype ---
dtype: "bfloat16"
weight_dtype: "bfloat16"

# --- Vocabulary ---
vocab_size: 8192
# TPU runs use learned embeddings (use_iota_embed=False, the default).
# Note: the GPU run used use_iota_embed=True instead.
use_iota_embed: false

# --- Attention ---
# attention=dot_product forces the standard (non-Pallas) attention path on TPU.
# This avoids Pallas/Flash kernel compatibility issues on v5e; Flash Attention
# would require attention=flash or attention=autoselected instead.
attention: "dot_product"

# --- Memory ---
# remat_policy=full recomputes activations during backward pass.
# scan_layers=True enables layer scanning (lax.scan), which is the TPU default
# and differs from the GPU run (scan_layers=False).
remat_policy: "full"
scan_layers: true

# --- MoE kernel flags ---
# TPU uses MegaBlox kernel (megablox=True), unlike the GPU run (megablox=False).
# sparse_matmul=True selects the XLA sparse compute path.
# use_tokamax_gmm=False and ragged_buffer_factor=-1 disable ragged GMM buffers.
sparse_matmul: true
megablox: true
use_tokamax_gmm: false
ragged_buffer_factor: -1

# --- Architecture override ---
override_model_config: true

# Core dimensions (scaled to ~0.719B total params)
base_emb_dim: 1024
base_mlp_dim: 5472
base_moe_mlp_dim: 704
base_num_decoder_layers: 10
base_num_query_heads: 8
base_num_kv_heads: 8

# MoE routing
first_num_dense_layers: 1
num_experts: 32
num_experts_per_tok: 3
shared_experts: 1

# DeepSeek-V2 latent attention (MLA) dimensions
kv_lora_rank: 512
q_lora_rank: 0
qk_nope_head_dim: 128
qk_rope_head_dim: 64
v_head_dim: 128
