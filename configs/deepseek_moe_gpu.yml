# DeepSeek MoE Model Configuration for GPU (Run 2 — Best Result)
# Model parameters: 0.719 Billion
# Hardware: 1x Nvidia Tesla T4 (Google Colab)

# --- General training ---
model_name: "deepseek2-16b"
steps: 50
dataset_type: "synthetic"
hardware: "gpu"
enable_checkpointing: false

# --- Sequence & batch ---
per_device_batch_size: 2
max_target_length: 512

# --- Dtype ---
dtype: "bfloat16"
weight_dtype: "bfloat16"

# --- Vocabulary ---
vocab_size: 8192
use_iota_embed: true

# --- Attention ---
attention: "dot_product"

# --- Memory optimization ---
# remat_policy=full recomputes activations during the backward pass instead of
# storing them, reducing peak VRAM from 8.03 GB (batch=1, no remat) to
# 4.02 GB (batch=2, remat=full). This is the primary enabler for batch=2.
remat_policy: "full"
scan_layers: false

# --- MoE kernel flags ---
# sparse_matmul=True / megablox=False / use_tokamax_gmm=False selects the
# standard XLA sparse path; ragged_buffer_factor=-1 disables ragged GMM buffers.
sparse_matmul: true
megablox: false
use_tokamax_gmm: false
ragged_buffer_factor: -1

# --- Architecture override ---
# override_model_config=True lets the flags below replace the deepseek2-16b defaults.
override_model_config: true

# Core dimensions (scaled to ~0.719B total params)
base_emb_dim: 1024
base_mlp_dim: 5472
base_moe_mlp_dim: 704
base_num_decoder_layers: 10
base_num_query_heads: 8
base_num_kv_heads: 8

# MoE routing
first_num_dense_layers: 1
num_experts: 32
num_experts_per_tok: 3
shared_experts: 1

# DeepSeek-V2 latent attention dimensions
kv_lora_rank: 512
q_lora_rank: 0
qk_nope_head_dim: 128
qk_rope_head_dim: 64
v_head_dim: 128